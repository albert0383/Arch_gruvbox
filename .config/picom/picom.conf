# Abilita o disabilita gli effetti di composizione
backend = "glx";  # Usa OpenGL per la composizione (migliore performance e effetti visivi)
vsync = true;     # Sincronizzazione verticale (evita il tearing)

# Impostazioni di ombra
shadow = true;                # Attiva le ombre
shadow_radius = 12;           # Raggio dell'ombra
shadow_offset_x = -15;        # Offset orizzontale dell'ombra
shadow_offset_y = -15;        # Offset verticale dell'ombra
shadow_opacity = 0.6;         # Opacità dell'ombra
no_dock_shadow = true;        # Disabilita le ombre per le finestre Dock
no_focus_shadow = true;       # Disabilita le ombre per le finestre non focalizzate

# Trasparenza e sfocatura (blur)
opacity-rule = [
  "80:class_g = 'URxvt'",     # Regola l'opacità per terminali
  "90:class_g = 'Stalonetray'"  # Regola l'opacità per il tray
];

blur-background = true;       # Attiva lo sfondo sfocato per le finestre non attive
blur-radius = 10;             # Raggio del blur
blur-background-frame = true; # Applica il blur anche alla finestra del frame

# Regola la trasparenza del pannello (in caso di polybar o simili)
fade_in_duration = 0.1;       # Durata della dissolvenza in entrata
fade_out_duration = 0.1;      # Durata della dissolvenza in uscita
fade = true;                  # Abilita l'effetto di dissolvenza

# Regola la trasparenza delle finestre
inactive-opacity = 0.9;       # Opacità per finestre non focalizzate
active-opacity = 1.0;         # Opacità per la finestra attiva
frame-opacity = 0.9;          # Opacità per il bordo della finestra
blur-background-frame = true; # Applica il blur anche alla finestra del frame

# Impostazioni di fading e dissolvenza
fade-in-step = 0.03;          # Passi di dissolvenza in entrata
fade-out-step = 0.03;         # Passi di dissolvenza in uscita

# Impostazioni di trasparenza automatica per le finestre
inactive-opacity-override = true;

# Definisce i limiti per le dimensioni della finestra per l'effetto di trasparenza
opacity-rule = [
  "80:class_g = 'URxvt'",     # Per esempio, regola la trasparenza di URxvt
  "90:class_g = 'Stalonetray'" # Trasparenza per il tray
];

# Gestione degli angoli arrotondati
corner-radius = 10;           # Raggio degli angoli della finestra
rounded-corners = true;       # Abilita gli angoli arrotondati

# Configura la durata di animazione delle finestre
animation-duration = 250;      # Durata animazione (millisecondi)
